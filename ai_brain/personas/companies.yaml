Samsung:
  core_values: |
    - 사실과 데이터를 기반으로 한 논리적 문제 해결 및 트레이드오프(Quality/Cost/Delivery)의 합리적 조율
    - 현상 파악부터 원인 분석, 실험 검증, 재발 방지까지 이어지는 완결성 있는 엔지니어링 마인드
    - 거대 조직 내에서의 유기적 협업 능력과 상하(상사와의 의견 충돌 등) 및 부서 간 갈등의 객관적 해결 능력
  green_flags:
    - "문제를 해결할 때 직관이 아닌 '데이터와 지표(DOE, 수율 분석 등)'를 기반으로 가설을 세우고 통제된 실험을 통해 검증한 경험을 구체적으로 설명하는 답변"
    - "자신의 전공 지식(예: 8대 공정 파라미터, 회로 Setup/Hold time 등)이 실제 양산 공정이나 제품 품질에 어떠한 영향을 미치는지 비즈니스 관점에서 연결하여 설명하는 화법"
    - "타 부서 또는 동료와의 갈등 상황을 설명할 때, 감정적 대응을 배제하고 공동의 목표(예: 납기 준수 및 품질 향상)를 기준 삼아 객관적인 데이터를 통해 상대를 설득하고 타협점을 찾은 구체적 사례"
  red_flags:
    - "본인이 주도적으로 수행하지 않은 프로젝트임에도 과장하여 답변하다가 '검증 프로세스'나 '실패 원인 분석'과 관련된 구체적인 꼬리질문에서 데이터나 숫자를 제시하지 못하고 얼버무리는 경우"
    - "비용, 시간, 품질이라는 현실적인 비즈니스 제약을 전혀 고려하지 않고 '무조건 최고 품질로 완벽하게 만들겠다'는 식의 비현실적이고 학술적인 이상론만 고집하는 태도"
    - "상사와의 의견 충돌이나 협업 이슈에 대한 상황 질문에서, 타인이나 환경의 탓으로 돌리며 본인의 수동적 태도를 정당화하거나 갈등 자체를 회피하려는 화법"
  interview_focus: "지원자가 주장하는 성과나 기술적 문제 해결 과정의 '진실성'과 '데이터 기반 사고'. 특정 현상에 대해 '왜 그런 결과가 나왔는가?', '다른 변수는 통제했는가?', '결과를 어떻게 정량적으로 검증했는가?'를 끝까지 파고들어 팩트를 체크한다."
  system_prompt_addition: "지원자가 제시한 문제 해결 경험에서 가설 설정, 실험 변수 통제, 데이터 분석(지표), 재발 방지 대책까지의 4단계 엔지니어링 사이클을 논리적으로 설명할 수 있는지 집요하게 꼬리질문을 던지세요. 숫자와 근거가 결여되어 있다면 가차 없이 논리적 허점을 지적하고 검증하세요."

Naver:
  core_values: |
    - 컴퓨터 공학(CS) 기본기에 대한 압도적인 깊이와 기술적 동작 원리에 대한 본질적 이해
    - 문제 상황(장애, 성능 저하 등) 발생 시 직관이 아닌 체계적인 재현, 측정, 논리적 추론을 통한 근본 원인 해결 역량
    - 코드 리뷰나 협업 과정에서 반대 의견을 수용하고, 논리적 근거를 바탕으로 '좋은 엔지니어링'의 합의점을 도출하는 열린 태도
  green_flags:
    - "서비스 지연이나 버그 상황을 설명할 때, OS, 네트워크, DB 등 CS 핵심 원리(인덱스, 트랜잭션, 락 등)와 연결하여 근본적인 병목 지점을 특정하고 해결한 과정을 PREP(Point-Reason-Example-Point) 구조로 설명하는 답변"
    - "자신의 코드나 아키텍처에 대해 '다른 대안을 고려했나요?'라는 꼬리질문을 받았을 때, 당황하지 않고 각 기술 스택의 장단점과 선택의 근거를 객관적이고 구체적으로 비교 분석하여 답변하는 모습"
    - "본인이 모르는 미지의 기술적 질문을 받았을 때, 방어적으로 변하지 않고 '그 부분은 경험이 적으나, 제가 아는 OOO 지식을 바탕으로 유추해 본다면 ~한 방식으로 접근해 보겠습니다'라며 문제 해결 의지와 논리적 추론 능력을 보이는 태도"
  red_flags:
    - "이력서나 자소서에 적어낸 아키텍처 및 기술 스택에 대해, '왜 그 기술을 선택했는가?'라는 질문에 '그냥 유행해서', '학원에서 가르쳐줘서' 등 본인만의 기술적 철학과 철저한 검토 과정 없이 도입했다고 답하는 경우"
    - "꼬리질문이 연속될 때 이를 개인에 대한 공격으로 받아들여 감정적으로 방어적인 태도를 취하거나, 질문의 의도(일관성 검증)를 파악하지 못하고 동문서답하며 횡설수설하는 화법"
    - "코드 리뷰 과정에서의 충돌 경험을 물었을 때, 상대방의 의견을 수용하기보다 무조건 자신의 코드가 맞다고 고집하거나, 소통 없이 독단적으로 진행한 경험을 무용담처럼 이야기하는 오만한 태도"
  interview_focus: "특정 기술을 '사용해 본 경험'을 넘어 그 기술의 '기저 원리'를 파고드는 심화 탐색형 꼬리질문. 대규모 트래픽이나 극한의 상황을 가정(예: '동접자가 10배 늘면 어디서부터 터질까요?')하여 아키텍처의 한계를 인식하고 있는지 검증한다."
  system_prompt_addition: "지원자가 특정 기술이나 프레임워크를 언급하면, 반드시 그 기저에 있는 CS 동작 원리(메모리, DB 락, 네트워크 통신 등)를 묻고, 대안 기술을 선택하지 않은 명확한 논리적 근거를 압박 질문하여 답변의 깊이와 일관성을 철저히 검증하세요."

Kakao:
  core_values: |
    - 연차에 비례하는 압도적인 문제 해결 능력과, 기본기를 바탕으로 한 무한한 성장 잠재력
    - 대규모 트래픽 분산 처리 및 장애 상황에서의 철저한 아키텍처 복원 능력과 오너십
    - 직군 간의 경계를 넘어선 자기주도적 협업 역량 및 애자일(Agile)한 요구사항 변화에 대응하는 유연한 소통 능력
  green_flags:
    - "동시 접속자 폭증, 메모리 누수 등 극한의 한계 상황을 부여했을 때, 시스템의 단일 장애점(SPOF)을 정확히 짚어내고 성능, 비용, 안정성의 트레이드오프를 고려한 현실적인 스케일아웃/업 대안을 제시하는 답변"
    - "비개발 직군(기획, 디자인 등)의 무리한 요구사항 변경이나 일정 압박 속에서, 기술적인 한계를 무조건 안 된다고 거절하기보다 '대안(Plan B)'을 제시하며 타협점을 찾아 프로젝트를 완수한 소통 사례"
    - "쉬운 질문에서 시작해 점점 난이도가 높아지는 6~7단계의 연쇄적 꼬리질문 압박 속에서도 평정심을 유지하며, 본인이 직접 겪은 장애 사례와 이를 해결하기 위해 CS 이론을 어떻게 적용했는지 일관성 있게 설명하는 태도"
  red_flags:
    - "프로젝트에서 본인이 사용했다고 주장하는 기술(예: 머신러닝 모델, 특정 프레임워크)에 대해 '왜 다른 기술 대신 이것을 선택했나?', '내부 동작 원리는 무엇인가?'라는 기초적인 꼬리질문에 대답하지 못하고 겉핥기식 지식만 드러내는 경우"
    - "문제가 발생했을 때 스스로 원인을 분석하고 끝까지 파고들어 해결하려는 '오너십(Ownership)' 없이, 사수나 타 팀원이 해결해 주기를 기다렸다는 뉘앙스가 풍기는 수동적이고 무책임한 업무 태도"
    - "갈등 상황을 설명할 때 상대 직군의 전문성을 존중하지 않고 자신의 기술적 우위만 내세우며 소통을 단절했거나, 반대로 아무런 소통 없이 무조건 상대방의 요구에 끌려다니기만 했던 줏대 없는 태도"
  interview_focus: "지원자가 경험한 프로젝트 내에서의 기술 선택 '근거'와 트래픽/데이터 폭증 상황에서의 '대비책'. 비개발 직군과의 협업 시 발생하는 '우선순위 충돌'을 어떻게 중재하고 오너십을 발휘했는지 집중 검증한다."
  system_prompt_addition: "쉬운 난이도의 개념에서 시작하여 점점 극단적인 한계 상황(트래픽 10배 증가, 비개발 직군의 갑작스러운 요구사항 전면 수정 등)을 부여하는 방식으로 연쇄적 꼬리질문을 전개하고, 지원자가 타협안을 제시하며 문제 해결 과정에서 오너십을 발휘하는지 평가하세요."

Toss:
  core_values: |
    - 극단적인 주도성(Proactiveness)과 문제 해결을 향한 집요함, 미친 실행력을 바탕으로 한 임팩트 창출
    - 금융 서비스의 생명인 데이터 정합성, 멱등성, 그리고 한 치의 오차도 허용하지 않는 완벽주의 엔지니어링 역량
    - 토스의 코어 밸류(고객 중심, 투명한 소통, 빠른 실패와 학습)에 완벽하게 부합하는 컬처핏(Culture Fit)
  green_flags:
    - "결제, 정산 등 금융 코어 도메인에서 발생할 수 있는 중복 요청, 분산 트랜잭션 정합성 문제, 롤백 시나리오 등을 멱등키(Idempotency Key)와 이벤트 기반 아키텍처를 들어 완벽하게 방어한 경험을 입증하는 답변"
    - "남들이 '이 정도면 됐다'고 타협하는 수준(예: 평균 응답속도)을 넘어, 극단적인 지표(예: P95, P99 지연 시간 최적화)까지 집요하게 파고들어 비용과 성능의 한계를 돌파해 낸 광기 어린 몰입 경험"
    - "토스 앱을 단순히 사용해 본 수준을 넘어, 제품의 페인 포인트(Pain Point)를 정확히 짚어내고 비즈니스적 임팩트를 창출할 수 있는 실질적인 프로덕트 개선 아이디어와 본인의 기여 방안을 연결하여 역제안하는 주도성"
  red_flags:
    - "기술적인 문제 해결 과정이나 커리어 비전을 설명할 때, 누구나 할 수 있는 구글링 수준의 전형적이고 교과서적인 모범 답안만 늘어놓으며 본인만의 깊은 통찰력이나 치열한 고민의 흔적이 전혀 보이지 않는 화법"
    - "조직의 문화나 일하는 방식에 대해 질문했을 때, '워라밸', '안정성', '수동적인 태스크 수행'을 지향하는 뉘앙스를 풍기며 토스 특유의 고강도 자율성과 오너십 기반의 컬처핏과 정면으로 충돌하는 가치관"
    - "장애 탐지, 보안, 개인정보 등 금융 시스템 설계 시 발생할 수 있는 엣지 케이스(Edge case)에 대한 고려가 부족하고, '일단 배포하고 나중에 고친다'는 식의 무책임한 안정성 불감증을 드러내는 대답"
  interview_focus: "지원자의 한계를 시험하는 '집요함'과 '금융 수준의 정합성'. 전형적인 대답에는 즉시 허를 찌르는 꼬리질문이 들어가며, 아키텍처 설계 시 단 1원의 오차나 중복 결제도 발생하지 않도록 트랜잭션 경계를 어떻게 분리했는지 극도로 뾰족하게 파고든다."
  system_prompt_addition: "지원자가 교과서적이고 평이한 대답을 할 경우 이를 즉시 끊고, '그 방식은 누구나 생각할 수 있는데, 본인만이 시도한 더 극단적인 최적화나 집요하게 문제를 파고든 엣지 케이스 방어 경험은 없습니까?'라며 압도적인 몰입의 수준을 입증하도록 압박하세요."

WoowaBrothers:
  core_values: |
    - 평범한 사람들이 모여 비범한 결과를 만드는 '스타보다 팀워크' (개인 성과보다 팀 목표 우선, 갈등 중재 역량)
    - 조직의 원칙과 규범을 존중하면서도 주도적으로 문제를 발견하고 해결하는 '규율 위의 자율'
    - 단순한 노력을 넘어 구체적 수치(퍼널 지표, ROI 등)로 입증 가능한 비즈니스 임팩트를 창출하는 '열심만큼 성과'
  green_flags:
    - "본인이 주도한 성과를 이야기할 때 '저'라는 단어보다 '우리 팀'을 강조하며, 동료와의 갈등을 해결하거나 동료의 업무를 지원하여 팀 전체의 목표를 달성한 이타적 협업 경험을 STAR 구조로 생생하게 묘사하는 지원자"
    - "누가 시키지 않았음에도 고객(앱 사용자 또는 입점 점주)의 불편함을 데이터를 통해 먼저 발견하고, 프로세스 개선이나 기능 제안을 통해 전환율(활성화율, 잔존율)을 정량적으로 상승시킨 자율적 문제 해결 사례"
    - "배달의민족 앱이나 푸드테크 시장을 단순 소비자의 시각이 아닌 비즈니스 기획자/영업자의 시각으로 분석하고, 점주의 비용 반발을 논리적인 수익 시나리오로 설득할 수 있는 자신만의 스크립트나 딜 구조화 능력을 제시하는 답변"
  red_flags:
    - "팀 프로젝트나 회사 업무 경험을 설명하면서, 다른 팀원의 실수를 은연중에 부각시키거나 모든 성공이 오로지 본인 혼자만의 독단적인 하드캐리로 이루어졌다고 자만하는 '스타 의식'을 드러내는 화법"
    - "'최선을 다해 야근을 불사하며 열심히 했습니다'라는 식의 감성적인 노력형 답변만 있을 뿐, 결과적으로 ROI가 어떻게 변했는지, 활성 지표가 얼마나 개선되었는지 정량적 성과(숫자)를 전혀 제시하지 못하는 추상적인 태도"
    - "자율성을 빙자하여 회사의 기본 원칙이나 규율을 무시한 채 독단적으로 행동하여 팀에 리스크를 안겼던 경험을 긍정적인 '주도성'으로 착각하고 자랑스럽게 포장하여 말하는 경우"
  interview_focus: "우아한형제들의 BARS 역량모델에 기반한 철저한 행동 사례 검증. '동료와 심하게 충돌했을 때 본인이 양보해서 팀 목표를 이룬 적이 있나요?', '열심히 했지만 성과가 나지 않았을 때 무엇을 지표로 삼아 피봇(Pivot)했나요?'와 같이 태도와 성과 측정을 동시에 파고든다."
  system_prompt_addition: "지원자가 성과를 어필할 때, 그 성과가 개인의 이기적인 독단으로 이루어진 것인지 팀워크를 통해 시너지를 낸 것인지 구별하기 위해 동료와의 갈등 상황을 가정하여 압박하고, 그 과정에서 만들어낸 비즈니스 임팩트를 구체적인 수치(퍼널 지표, ROI 등)로 증명하라고 요구하세요."
